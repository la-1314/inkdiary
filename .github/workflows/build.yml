name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # -------------------------------------------------------------- version
      # Push to main  -> dev prerelease: versionName = 1.0.0-dev.<run_number>
      # Push a v* tag -> stable release:  versionName = <tag without v>
      # versionCode always = run_number (monotonic, for upgrade detection)
      - name: Compute version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION_NAME="${TAG#v}"
            echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "is_release_event=true" >> "$GITHUB_OUTPUT"
          else
            VERSION_NAME="1.0.0-dev.${GITHUB_RUN_NUMBER}"
            TAG="v${VERSION_NAME}"
            echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            # Only create a release on main branch pushes (not PRs)
            if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
              echo "is_release_event=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_release_event=false" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "version_code=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"
          echo "==> versionName=$VERSION_NAME  versionCode=$GITHUB_RUN_NUMBER  tag=$TAG"

      - name: Download Dancing Script font
        run: |
          mkdir -p app/src/main/assets/fonts
          curl -L --retry 3 --max-time 60 -o app/src/main/assets/fonts/DancingScript-Regular.ttf \
            "https://github.com/googlefonts/DancingScript/raw/main/fonts/ttf/DancingScript-Regular.ttf"
          ls -lh app/src/main/assets/fonts/

      - name: Download Make Me a Hanzi stroke data
        run: |
          mkdir -p tmp
          curl -L --retry 3 --max-time 120 -o tmp/graphics.txt \
            "https://raw.githubusercontent.com/skishore/makemeahanzi/master/graphics.txt"
          LINE_COUNT=$(wc -l < tmp/graphics.txt)
          echo "Downloaded $LINE_COUNT lines"
          if [ "$LINE_COUNT" -lt 1000 ]; then
            echo "ERROR: graphics.txt too small, download may have failed"
            exit 1
          fi
          curl -L --retry 3 --max-time 30 -o app/src/main/assets/ARPHICPL.TXT \
            "https://raw.githubusercontent.com/skishore/makemeahanzi/master/APL/ARPHICPL.TXT" || true
          ls -lh tmp/graphics.txt

      - name: Build compact hanzi data (common chars)
        run: |
          python3 scripts/build_hanzi_data.py \
            tmp/graphics.txt \
            app/src/main/assets/hanzi_common.json
          if [ ! -f app/src/main/assets/hanzi_common.json ]; then
            echo "ERROR: hanzi_common.json was not created"
            exit 1
          fi
          ls -lh app/src/main/assets/hanzi_common.json

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.2

      - name: Build release APK
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: List built APKs
        run: |
          find app/build/outputs/apk -name '*.apk' -exec ls -lh {} \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: inkdiary-v${{ steps.version.outputs.version_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: steps.version.outputs.is_release_event == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: InkDiary ${{ steps.version.outputs.version_name }}
          body: |
            ## InkDiary v${{ steps.version.outputs.version_name }}

            | Field | Value |
            | --- | --- |
            | Version code | ${{ steps.version.outputs.version_code }} |
            | Build | #${{ github.run_number }} |
            | Commit | ${{ github.sha }} |
            | Type | ${{ steps.version.outputs.prerelease == 'true' && 'Pre-release (dev)' || 'Stable release' }} |

            ### Install
            Download `app-release.apk` below and install it on your Android device
            (you may need to enable "Install from unknown sources").
          files: app/build/outputs/apk/release/*.apk
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
